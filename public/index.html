<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Differ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Repo Selector -->
    <div id="repo-selector" class="panel">
      <div class="repo-input-row">
        <svg class="icon" viewBox="0 0 16 16" width="18" height="18"><path fill="currentColor" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1h-6a1 1 0 00-1 1v6.708A2.486 2.486 0 017.5 9h5V1.5zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/></svg>
        <input type="text" id="repo-path" placeholder="Enter path to a git repository..." spellcheck="false">
        <button id="open-btn">Open</button>
      </div>
      <div id="repo-error" class="error-msg hidden"></div>
    </div>

    <!-- Main Layout -->
    <div id="main" class="hidden">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div id="branch-section">
          <label class="section-label">Branch</label>
          <div class="branch-dropdown" id="branch-dropdown">
            <button id="branch-btn" class="branch-toggle">
              <svg class="icon" viewBox="0 0 16 16" width="14" height="14"><path fill="currentColor" d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/></svg>
              <span id="current-branch">Select branch</span>
              <svg class="chevron" viewBox="0 0 16 16" width="12" height="12"><path fill="currentColor" d="M4.427 7.427l3.396 3.396a.25.25 0 00.354 0l3.396-3.396A.25.25 0 0011.396 7H4.604a.25.25 0 00-.177.427z"/></svg>
            </button>
            <div id="branch-menu" class="branch-menu hidden">
              <input type="text" id="branch-search" placeholder="Filter branches..." spellcheck="false">
              <div id="branch-list"></div>
            </div>
          </div>
        </div>
        <div id="commit-section">
          <label class="section-label">Commits</label>
          <div id="commit-list" class="commit-list"></div>
        </div>
      </aside>

      <!-- Diff Viewer -->
      <main id="diff-area">
        <div id="diff-placeholder" class="placeholder">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v18M3 12h18" stroke-linecap="round"/></svg>
          <p>Select a commit to view changes</p>
        </div>
        <div id="diff-content" class="hidden">
          <div id="commit-header"></div>
          <div id="file-tabs"></div>
          <div id="diff-viewer"></div>
        </div>
      </main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
